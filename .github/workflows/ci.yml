name: CI
on: [push]
jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install CMake
      run: sudo apt-get install -y cmake
    - name: Build all components
      run: |
        cd $GITHUB_WORKSPACE
        for d in formatter_lib formatter_ex_lib hello_world solver; do
          if [ -d "$d" ]; then
            cd $d && cmake -H. -B_build && cmake --build _build && cd ..
          else
            echo "Warning: Directory $d not found"
          fi
        done
  windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Build all components
      run: |
        cd $env:GITHUB_WORKSPACE
        $components = @("formatter_lib", "formatter_ex_lib", "hello_world", "solver")
        foreach ($d in $components) {
          if (Test-Path $d) {
            cd $d
            cmake -H. -B_build
            cmake --build _build
            cd ..
          } else {
            Write-Host "Warning: Directory $d not found"
          }
        }

name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        build_type: [Debug, Release]

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}

    - name: Build
      run: cmake --build build --config ${{ matrix.build_type }}

    - name: Test hello_world
      run: |
        if [ "${{ matrix.os }}" = "windows-latest" ]; then
          ./build/hello_world/${{ matrix.build_type }}/hello_world.exe
        else
          ./build/hello_world/hello_world
        fi
      shell: bash

    - name: Test solver
      run: |
        if [ "${{ matrix.os }}" = "windows-latest" ]; then
          echo "1 -3 2" | ./build/solver/${{ matrix.build_type }}/solver.exe
        else
          echo "1 -3 2" | ./build/solver/solver
        fi
      shell: bash
